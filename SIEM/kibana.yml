# =============================================================================
# 🛡️ KIBANA PRODUCTION CONFIGURATION (SECURE & HARDENED)
# =============================================================================

server.name: "ecp-kibana"
server.host: "0.0.0.0"
server.port: 5601

# -----------------------------------------------------------------------------
# 🔌 ELASTICSEARCH SECURE CONNECTION
# -----------------------------------------------------------------------------
elasticsearch.hosts: ["https://ecp-elasticsearch:9200"]
elasticsearch.username: "kibana_system"
elasticsearch.password: "${ELASTICSEARCH_PASSWORD}"

# Verify the SSL certificate of the Elasticsearch node
elasticsearch.ssl.certificateAuthorities: [ "/usr/share/kibana/config/certs/ca/ca.crt" ]
elasticsearch.ssl.verificationMode: "certificate"

# -----------------------------------------------------------------------------
# 🔒 SERVER SSL / HTTPS FOR USER TRAFFIC
# -----------------------------------------------------------------------------
server.ssl.enabled: true
server.ssl.certificate: "/usr/share/kibana/config/certs/kibana/kibana.crt"
server.ssl.key: "/usr/share/kibana/config/certs/kibana/kibana.key"

# -----------------------------------------------------------------------------
# 🔑 ENCRYPTION & SECURITY KEYS (32+ Bytes mandatory keys)
# -----------------------------------------------------------------------------
xpack.security.encryptionKey: "${ENCRYPTION_KEY}"
xpack.encryptedSavedObjects.encryptionKey: "${ENCRYPTION_KEY}"
xpack.reporting.encryptionKey: "${ENCRYPTION_KEY}"

# -----------------------------------------------------------------------------
# 📊 TELEMETRY & SYSTEM SETTINGS
# -----------------------------------------------------------------------------
telemetry.enabled: false
logging.root.level: "info"
