input {
  # 1. Nhận log từ hệ thống WIDS ảo (đã chuẩn hóa qua virtual_wips_detector hoặc kismet_to_elk bridge)
  file {
    path => "/usr/share/logstash/wids/wips-alerts.json"
    codec => "json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["wids", "wireless"]
  }
  
  # 2. Nhận log giả lập Network (DHCP, Firewall, DNS)
  file {
    path => "/usr/share/logstash/network/network-events.json"
    codec => "json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["network", "correlation"]
  }

  # 3. Input mặc định (Sample log)
  file {
    path => "/usr/share/logstash/sample.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  if "wids" in [tags] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "wids-alerts" }
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  } 
  
  else if "network" in [tags] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "network-events" }
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  } 
  
  # Chỉ thực hiện phân tích grok cho các log mặc định khác (tránh lỗi grok parse cho Kismet)
  else if !("kismet_direct" in [tags]) {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} \[%{DATA:thread}\] %{GREEDYDATA:log_message}" }
    }
    mutate {
      add_field => { "[@metadata][index_prefix]" => "sample-logs" }
    }
  }
}

output {
  # Chỉ xuất các log thuộc luồng chính (không bao gồm log của kismet.conf để tránh trùng lặp)
  if !("kismet_direct" in [tags]) {
    elasticsearch {
      hosts => ["https://ecp-elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
      index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    }
    stdout { 
      codec => rubydebug 
    }
  }
}
