input {
  # Nhận log từ hệ thống WIDS ảo (đã chuẩn hóa qua kismet_to_elk bridge)
  file {
    path => "/usr/share/logstash/wids/wips-alerts.json"
    codec => "json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["wids", "wireless"]
  }
}

filter {
  if "wids" in [tags] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "wids-alerts" }
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  # Chỉ xuất các log WIDS sang Elasticsearch
  if "wids" in [tags] {
    elasticsearch {
      hosts => ["https://ecp-elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
      index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    }
    stdout { 
      codec => rubydebug 
    }
  }
}
