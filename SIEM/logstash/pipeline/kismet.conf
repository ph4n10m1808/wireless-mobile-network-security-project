input {
  # Nhận log trực tiếp từ Kismet (nếu Kismet được cấu hình ghi log alert dạng JSON phẳng)
  file {
    path => "/usr/share/logstash/kismet_raw/*_alerts.json"
    codec => "json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["kismet_direct", "wireless"]
  }
}

filter {
  if "kismet_direct" in [tags] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "wids-alerts" }
      # Đổi tên trường để đồng bộ cấu trúc với dashboard Kibana
      rename => {
        "[kismet.alert.text]" => "description"
        "[kismet.alert.source_mac]" => "client_mac"
        "[kismet.alert.bssid]" => "bssid"
        "[kismet.alert.ssid]" => "ssid"
        "[kismet.alert.channel]" => "channel"
      }
    }
    
    # Chuẩn hóa mức độ nghiêm trọng (Severity) dựa trên thang điểm 0-10 của Kismet
    if [kismet.alert.severity] >= 8 {
      mutate { add_field => { "severity" => "critical" } }
    } else if [kismet.alert.severity] >= 5 {
      mutate { add_field => { "severity" => "high" } }
    } else {
      mutate { add_field => { "severity" => "medium" } }
    }
    
    date {
      match => [ "timestamp", "UNIX" ]
      target => "@timestamp"
    }
  }
}

output {
  # Chỉ xuất các sự kiện của Kismet sang Elasticsearch
  if "kismet_direct" in [tags] {
    elasticsearch {
      hosts => ["https://ecp-elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
      index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    }
    stdout { 
      codec => rubydebug 
    }
  }
}
